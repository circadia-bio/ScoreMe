<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#4A7BB5" />

    <title>ScoreMe</title>
    <meta name="description" content="Research questionnaire scorer for Circadia Lab" />

    <!-- Standard favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />

    <!-- Apple PWA -->
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ScoreMe" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph (WhatsApp, Slack, iMessage) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="ScoreMe" />
    <meta property="og:description" content="Research questionnaire scorer · Circadia Lab" />
    <meta property="og:image"       content="/assets/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / iMessage fallback -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ScoreMe" />
    <meta name="twitter:description" content="Research questionnaire scorer · Circadia Lab" />
    <meta name="twitter:image"       content="/assets/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
